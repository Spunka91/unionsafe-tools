<!DOCTYPE html>
<html>
<head>
  <title>UnionSafe Tools</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>UnionSafe Tools</h1>

<div class="dashboard">

  <div class="box">
    <h3>OSHA Reference</h3>
    <textarea id="oshaRef"></textarea>
    <button onclick="oshaRef()">Check</button>
    <p id="oshaRefResult"></p>
  </div>

  <div class="box">
    <h3>OSHA Violation Check</h3>
    <textarea id="oshaCheck"></textarea>
    <button onclick="oshaCheck()">Check</button>
    <p id="oshaCheckResult"></p>
  </div>

  <div class="box">
    <h3>Exposure / PPE</h3>
    <textarea id="ppe"></textarea>
    <button onclick="ppeCheck()">Check</button>
    <p id="ppeResult"></p>
  </div>

  <div class="box">
    <h3>Should I Stop Work?</h3>
    <textarea id="stopWork"></textarea>
    <button onclick="stopWorkCheck()">Check</button>
    <p id="stopWorkResult"></p>
  </div>

  <div class="box">
    <h3>Time Pressure Risk</h3>
    <textarea id="timePressure"></textarea>
    <button onclick="timePressureCheck()">Check</button>
    <p id="timePressureResult"></p>
  </div>

  <div class="box">
    <h3>Near Miss Builder</h3>
    <textarea id="nearMiss"></textarea>
    <button onclick="nearMissCheck()">Build</button>
    <p id="nearMissResult"></p>
  </div>

  <div class="box">
    <h3>Who Do I Report This To?</h3>
    <textarea id="report"></textarea>
    <button onclick="reportCheck()">Check</button>
    <p id="reportResult"></p>
  </div>

</div>

<form id="contactForm">
  <input name="name" placeholder="Name" required>
  <input type="email" name="email" placeholder="Email" required>
  <input name="organization" placeholder="Organization" required>

  <label>
    <input type="checkbox" name="mailing_list" required>
    Do you want to be on the mailing list?
  </label>

  <textarea name="message" placeholder="Describe situation" required></textarea>

  <button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
